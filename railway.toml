# Grading service builds from the REPO ROOT (Railway Root Directory must be EMPTY).
# Dockerfile.grading COPYs from services/grading-api/ — mirrors the proven pre-monorepo setup.
[build]
dockerfilePath = "Dockerfile.grading"
# Path-scoped deploys: only rebuild grading when GRADING files change, so a product-only merge to main
# never redeploys this service (and turbo-ignore does the same for the Vercel side). See /CONTRACT.md.
watchPatterns = [
  "services/grading-api/**",
  "Dockerfile.grading",
  "railway.toml",
]

[deploy]
healthcheckPath    = "/health"
healthcheckTimeout = 120
restartPolicyType  = "on_failure"
